<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lupa Web Panel</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <lupa-shell>
    <div class="boot-splash" aria-hidden="true">
      <div class="boot-top">
        <div class="boot-brand">
          <div class="boot-logo"></div>
          <div class="boot-title">LUPA</div>
        </div>
        <div class="boot-search"></div>
        <div class="boot-pill"></div>
      </div>
      <div class="boot-main">
        <div class="boot-side"></div>
        <div class="boot-center"></div>
        <div class="boot-side-right"></div>
      </div>
    </div>
  </lupa-shell>
  <script type="module" src="./app.js"></script>
</body>
</html>

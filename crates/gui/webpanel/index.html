<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lupa Web Panel</title>
  <style>
    :root {
      --bg-root: #070911;
      --bg-panel: #0b0f1a;
      --line-soft: rgba(255, 255, 255, 0.05);
      --line: rgba(255, 255, 255, 0.08);
      --text-100: rgba(255, 255, 255, 0.96);
    }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg-root);
      color: var(--text-100);
      font-family: "Segoe UI", system-ui, sans-serif;
    }
    .boot-splash {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-rows: 52px minmax(0, 1fr);
      background: radial-gradient(1200px 600px at 25% -20%, rgba(124, 56, 255, 0.14), transparent 55%), var(--bg-root);
    }
    .boot-top {
      display: grid;
      grid-template-columns: 200px minmax(320px, 1fr) 86px;
      align-items: center;
      gap: 12px;
      padding: 0 12px;
      border-bottom: 1px solid var(--line-soft);
      background: linear-gradient(180deg, #0b0e18 0%, #090c15 100%);
    }
    .boot-brand { display: inline-flex; align-items: center; gap: 10px; }
    .boot-logo {
      width: 34px; height: 34px; border-radius: 10px;
      background: linear-gradient(135deg, #9961ff 0%, #6c31ff 100%);
      box-shadow: 0 8px 18px rgba(108, 49, 255, 0.33);
    }
    .boot-title { font-size: 24px; font-weight: 800; letter-spacing: .14em; }
    .boot-search {
      height: 38px; border-radius: 12px; border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.03);
    }
    .boot-pill {
      height: 30px; border-radius: 10px; border: 1px solid rgba(61, 231, 175, 0.34);
      background: rgba(13, 112, 81, 0.26);
    }
    .boot-main {
      min-height: 0; display: grid; grid-template-columns: 236px 1fr 340px;
    }
    .boot-side, .boot-side-right {
      border-right: 1px solid var(--line-soft);
      background: linear-gradient(180deg, #090c16 0%, #090b14 100%);
    }
    .boot-side-right {
      border-right: 0; border-left: 1px solid var(--line-soft); background: var(--bg-panel);
    }
    .boot-center { background: rgba(255, 255, 255, 0.01); }
  </style>
  <link rel="preload" href="./styles.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="./styles.css"></noscript>
</head>
<body>
  <lupa-shell>
    <div class="boot-splash" aria-hidden="true">
      <div class="boot-top">
        <div class="boot-brand">
          <div class="boot-logo"></div>
          <div class="boot-title">LUPA</div>
        </div>
        <div class="boot-search"></div>
        <div class="boot-pill"></div>
      </div>
      <div class="boot-main">
        <div class="boot-side"></div>
        <div class="boot-center"></div>
        <div class="boot-side-right"></div>
      </div>
    </div>
  </lupa-shell>
  <script type="module" src="./app.js"></script>
</body>
</html>
